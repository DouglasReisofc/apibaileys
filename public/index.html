<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baileys Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Baileys Multi Session</h1>
  <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="dash-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button" role="tab">Dashboard</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="docs-tab" data-bs-toggle="tab" data-bs-target="#docs" type="button" role="tab">Docs</button>
    </li>
  </ul>
  <div class="tab-content">
  <div class="tab-pane fade show active" id="dashboard" role="tabpanel">
  <div class="mb-3">
    <select id="sessionSelect" class="form-select mb-2"></select>
    <input id="sessionId" class="form-control mb-2" placeholder="Session ID" />
    <input id="webhook" class="form-control" placeholder="Webhook URL" />
    <div class="mt-2">
      <button id="createBtn" class="btn btn-primary">Create/Update</button>
      <button id="restartBtn" class="btn btn-warning ms-2">Reconnect</button>
      <button id="deleteBtn" class="btn btn-danger ms-2">Delete</button>
    </div>
  </div>

  <div class="mb-3">
    <div id="status" class="mb-2 fw-bold"></div>
    <canvas id="qrCanvas" class="mb-3"></canvas>
    <input id="number" class="form-control" placeholder="Number" />
    <textarea id="message" class="form-control mt-2" placeholder="Message"></textarea>
    <div class="form-check mt-2">
      <input class="form-check-input" type="checkbox" id="ghostCheck">
      <label class="form-check-label" for="ghostCheck">Ghost mention</label>
    </div>
    <input id="replyId" class="form-control mt-2" placeholder="Reply message ID" />
    <input type="file" id="mediaFile" class="form-control mt-2" />
    <button id="sendBtn" class="btn btn-success mt-2">Send Text</button>
    <button id="sendMediaBtn" class="btn btn-secondary mt-2 ms-2">Send Media</button>
    <input id="pollQuestion" class="form-control mt-2" placeholder="Poll question" />
    <input id="pollOptions" class="form-control mt-2" placeholder="Options (comma separated)" />
    <button id="sendPollBtn" class="btn btn-secondary mt-2">Send Poll</button>
    <input id="deleteMsgId" class="form-control mt-2" placeholder="Delete message ID" />
    <button id="deleteMsgBtn" class="btn btn-danger mt-2">Delete Msg</button>
  </div>
  <pre id="log" class="bg-white p-2"></pre>
</div>
  <div class="tab-pane fade" id="docs" role="tabpanel">
    <pre id="docsContent" class="bg-white p-3"></pre>
  </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
let poll;
function log(obj) {
  document.getElementById('log').textContent = JSON.stringify(obj, null, 2);
}
async function loadSessions() {
  const res = await fetch('/api/sessions');
  const data = await res.json();
  const sel = document.getElementById('sessionSelect');
  const prev = sel.value;
  sel.innerHTML = '';
  data.sessions.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.id} (${s.status})`;
    sel.appendChild(opt);
  });
  if (prev) {
    sel.value = prev;
  }
  if (!sel.value && data.sessions.length) {
    sel.value = data.sessions[0].id;
  }
  if (sel.value) startPolling(sel.value);
}

async function createSession() {
  const id = document.getElementById('sessionId').value;
  const webhook = document.getElementById('webhook').value;
  const res = await fetch('/api/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id, webhook})
  });
  const data = await res.json();
  log(data);
  await loadSessions();
  document.getElementById('sessionSelect').value = id;
  startPolling(id);
}
async function sendMessage() {
  const sessionId = document.getElementById('sessionSelect').value;
  const number = document.getElementById('number').value;
  const message = document.getElementById('message').value;
  const ghost = document.getElementById('ghostCheck').checked;
  const quotedId = document.getElementById('replyId').value;
  const res = await fetch('/api/message', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sessionId, number, message, ghost, quotedId})
  });
  const data = await res.json();
  log(data);
}

async function sendMedia() {
  const sessionId = document.getElementById('sessionSelect').value;
  const number = document.getElementById('number').value;
  const ghost = document.getElementById('ghostCheck').checked;
  const quotedId = document.getElementById('replyId').value;
  const file = document.getElementById('mediaFile').files[0];
  if (!file) return alert('Select a file');
  const toBase64 = f => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = err => rej(err);
    reader.readAsDataURL(f);
  });
  const media = await toBase64(file);
  const res = await fetch('/api/message/media', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      sessionId,
      number,
      caption: document.getElementById('message').value,
      mimetype: file.type,
      media,
      ghost,
      quotedId
    })
  });
  const data = await res.json();
  log(data);
}

async function sendPoll() {
  const sessionId = document.getElementById('sessionSelect').value;
  const number = document.getElementById('number').value;
  const question = document.getElementById('pollQuestion').value;
  const options = document.getElementById('pollOptions').value.split(',').map(s => s.trim()).filter(Boolean);
  if (!question || !options.length) return alert('Question and options required');
  const res = await fetch('/api/message/poll', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ sessionId, number, question, options })
  });
  const data = await res.json();
  log(data);
}

async function deleteMessage() {
  const sessionId = document.getElementById('sessionSelect').value;
  const number = document.getElementById('number').value;
  const messageId = document.getElementById('deleteMsgId').value;
  const res = await fetch('/api/message/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ sessionId, number, messageId })
  });
  const data = await res.json();
  log(data);
}

async function restart() {
  const id = document.getElementById('sessionSelect').value;
  const res = await fetch(`/api/session/${id}/reconnect`, { method: 'POST' });
  const data = await res.json();
  log(data);
  startPolling(id);
}

async function deleteCurrent() {
  const id = document.getElementById('sessionSelect').value;
  const res = await fetch(`/api/session/${id}`, { method: 'DELETE' });
  const data = await res.json();
  log(data);
  loadSessions();
}

function startPolling(id) {
  if (poll) clearInterval(poll);
  fetchStatus(id); // initial
  poll = setInterval(() => fetchStatus(id), 3000);
}

async function fetchStatus(id) {
  const res = await fetch(`/api/session/${id}/status`);
  const { status } = await res.json();
  document.getElementById('status').textContent = `Status: ${status}`;
  if (status === 'qr') {
    const qrRes = await fetch(`/api/session/${id}/qr`);
    if (qrRes.ok) {
      const { qr } = await qrRes.json();
      QRCode.toCanvas(document.getElementById('qrCanvas'), qr);
    }
  } else {
    const canvas = document.getElementById('qrCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
}

document.getElementById('createBtn').addEventListener('click', createSession);
document.getElementById('sendBtn').addEventListener('click', sendMessage);
document.getElementById('restartBtn').addEventListener('click', restart);
document.getElementById('deleteBtn').addEventListener('click', deleteCurrent);
document.getElementById('sendMediaBtn').addEventListener('click', sendMedia);
document.getElementById('sendPollBtn').addEventListener('click', sendPoll);
document.getElementById('deleteMsgBtn').addEventListener('click', deleteMessage);
document.getElementById('sessionSelect').addEventListener('change', (e) => {
  if (e.target.value) startPolling(e.target.value);
});
document.getElementById('docs-tab').addEventListener('shown.bs.tab', loadDocs);
async function loadDocs(){
  const res = await fetch('/README.md');
  document.getElementById('docsContent').textContent = await res.text();
}
loadDocs();
loadSessions();
setInterval(loadSessions, 5000);
</script>
</body>
</html>
