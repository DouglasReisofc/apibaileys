<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baileys Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
<div class="container py-4">
  <h1 class="mb-4">Baileys Multi Session</h1>
  <div class="mb-3">
    <input id="sessionId" class="form-control" placeholder="Session ID" />
    <button id="createBtn" class="btn btn-primary mt-2">Create Session</button>
  </div>
  <div class="mb-3">
    <input id="number" class="form-control" placeholder="Number" />
    <textarea id="message" class="form-control mt-2" placeholder="Message"></textarea>
    <button id="sendBtn" class="btn btn-success mt-2">Send Message</button>
  </div>
  <pre id="log" class="bg-white p-2"></pre>
</div>
<script>
async function createSession() {
  const id = document.getElementById('sessionId').value;
  const res = await fetch('/api/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id})
  });
  const data = await res.json();
  document.getElementById('log').textContent = JSON.stringify(data, null, 2);
}
async function sendMessage() {
  const sessionId = document.getElementById('sessionId').value;
  const number = document.getElementById('number').value;
  const message = document.getElementById('message').value;
  const res = await fetch('/api/message', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sessionId, number, message})
  });
  const data = await res.json();
  document.getElementById('log').textContent = JSON.stringify(data, null, 2);
}
document.getElementById('createBtn').addEventListener('click', createSession);
document.getElementById('sendBtn').addEventListener('click', sendMessage);
</script>
</body>
</html>
